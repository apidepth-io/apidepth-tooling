name: Hello

on:
  workflow_call:
    inputs:
      docs:
        description: "Space-separated list of doc files to check (e.g. README.md CLAUDE.md)"
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: "3.12"
      model:
        required: false
        type: string
        default: "claude-sonnet-4-6"
      diff-depth:
        description: "Number of commits to diff (default 1 = HEAD^ vs HEAD)"
        required: false
        type: string
        default: "1"
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  doc-update:
    name: AI doc update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - run: echo "ok"
