name: Lint Fix JavaScript/TypeScript

# Reusable workflow — apply ESLint and Prettier auto-fixes and commit them
# back to the PR branch. Intended to be called from consumer repos on
# pull_request events.
#
# Flow:
#   1. eslint --fix    — fixes all auto-correctable lint issues in-place
#   2. prettier --write — applies opinionated formatting in-place
#   3. git-auto-commit  — commits any changes back to the PR branch
#
# After this workflow commits, the regular lint-javascript check workflow is
# re-triggered by the synchronize event and should pass cleanly.
# ESLint is run with continue-on-error so formatting fixes are still committed
# even when unfixable issues remain; those are surfaced by the check workflow.

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "20"

jobs:
  lint-fix:
    name: ESLint + Prettier Auto-fix
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push the auto-fix commit back to the branch

    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the PR head branch so we can push fixes back to it.
          # Without this, actions/checkout defaults to a detached HEAD at the
          # merge commit and the auto-commit push has no target branch.
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - run: npm ci

      # Apply all auto-fixable ESLint issues in-place.
      # continue-on-error: true so unfixable issues don't block the Prettier
      # step or the commit — the check workflow will surface them as failures.
      - name: ESLint Fix
        run: npx eslint --fix .
        continue-on-error: true

      # Apply opinionated formatting in-place (always exits 0).
      - name: Prettier Fix
        run: npx prettier --write .

      # Commit any changes ESLint/Prettier made back to the PR branch.
      # No-ops silently when nothing changed.
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: auto-fix ESLint and Prettier"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
