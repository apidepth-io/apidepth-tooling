name: Coverage - JavaScript/TypeScript

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "20"
      coverage-script:
        required: false
        type: string
        default: "test:coverage"

jobs:
  coverage:
    name: Vitest Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - run: npm ci

      - name: Run coverage
        run: npm run ${{ inputs.coverage-script }}
