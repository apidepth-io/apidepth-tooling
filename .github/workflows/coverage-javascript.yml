name: Coverage - JavaScript/TypeScript

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "20"
      coverage-script:
        required: false
        type: string
        default: "test:coverage"
      min-coverage:
        required: false
        type: number
        default: 80

jobs:
  coverage:
    name: Vitest Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - run: npm ci

      - name: Run coverage
        run: npm run ${{ inputs.coverage-script }}

      - name: Enforce coverage threshold
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const file = 'coverage/coverage-summary.json';
          if (!fs.existsSync(file)) {
            console.log('No coverage/coverage-summary.json found — skipping threshold check.');
            console.log('Add json-summary to your coverage reporters to enable enforcement.');
            process.exit(0);
          }
          const summary = JSON.parse(fs.readFileSync(file, 'utf8'));
          const pct = summary.total.lines.pct;
          const min = ${{ inputs.min-coverage }};
          console.log(`Line coverage: ${pct}%`);
          if (pct < min) {
            console.error(`Coverage ${pct}% is below minimum ${min}%`);
            process.exit(1);
          }
          console.log(`Coverage OK (>= ${min}%)`);
          EOF
