repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: system
        entry: npx eslint --fix
        files: \.[jt]sx?$
        types: [file]
        pass_filenames: true

      - id: prettier
        name: Prettier
        language: system
        entry: npx prettier --write
        files: \.[jt]sx?$
        types: [file]
        pass_filenames: true
