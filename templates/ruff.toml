line-length = 100
target-version = "py39"
exclude = ["examples/"]

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
]
ignore = [
  "E501",  # line length — handled by formatter
]

[lint.isort]
known-first-party = ["apidepth"]

[format]
quote-style = "double"
indent-style = "space"
