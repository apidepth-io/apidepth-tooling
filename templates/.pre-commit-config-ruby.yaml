repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: rubocop
        name: RuboCop
        language: system
        entry: bundle exec rubocop --autocorrect-all
        types: [ruby]
        pass_filenames: false
